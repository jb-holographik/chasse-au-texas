<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Barba slider test B</title>
    <link href="/src/styles/style.css" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        background: #101010;
        color: #fff;
        font-family: sans-serif;
      }

      .section_activite {
        padding: 2em;
        max-width: 960px;
        margin: 0 auto;
      }

      .nav-link {
        display: inline-block;
        margin: 2em;
        color: #ecdcc3;
      }
    </style>
  </head>
  <body>
    <div id="content" class="page-wrapper" data-barba="wrapper">
      <main class="main-wrapper" data-barba="container" data-barba-namespace="slider-b">
        <section class="section_activite">
          <h1>Page B</h1>
          <div class="activite_images">
            <div class="activite_images-inner">
              <div class="activite_images_img">
                <img
                  src="https://picsum.photos/seed/a/1200/800"
                  alt=""
                  class="activite_img"
                />
              </div>
              <div class="activite_images_img is-second">
                <img
                  src="https://picsum.photos/seed/b/1200/800"
                  alt=""
                  class="activite_img"
                />
              </div>
              <div class="activite_images_img">
                <img
                  src="https://picsum.photos/seed/c/1200/800"
                  alt=""
                  class="activite_img"
                />
              </div>
              <div class="activite_images_img">
                <img
                  src="https://picsum.photos/seed/d/1200/800"
                  alt=""
                  class="activite_img"
                />
              </div>
              <div class="activite_images_img">
                <img
                  src="https://picsum.photos/seed/e/1200/800"
                  alt=""
                  class="activite_img"
                />
              </div>
            </div>
          </div>
          <a class="nav-link" href="/scripts/test-barba-slider-a.html">Retour page A</a>
        </section>
      </main>
    </div>
    <script type="module">
      import { initPageTransitions } from '/src/animations/page-transition.js'

      initPageTransitions()
    </script>
  </body>
</html>
